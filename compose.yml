services:
  docs:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        RUN pip install --no-cache-dir \
          sphinx \
          sphinx-autobuild \
          sphinx-rtd-theme \
          myst-parser
        CMD ["sphinx-autobuild", "docs/source", "docs/build", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/app/docs
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./logs:/app/logs
      - ./.agents:/app/.agents
    command: ["python", "-m", "src.main"]
